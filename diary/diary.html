
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Päiväkirja</title>

  <!-- Fontit -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
</head>

<body>

  <!-- NAVBAR -->
  <nav>
    <ul>
      <li><a href="/index.html">Etusivu</a></li>
      <li><a href="/diary/diary.html">Päiväkirja</a></li>
      <li><a href="/bmi/bmi.html">BMI-Laskuri</a></li>
      <li><a href="/yhteystiedot/yhteystiedot.html">Yhteystiedot</a></li>
      <li><a href="/login/login.html">Kirjaudu</a></li>
    </ul>
  </nav>
  
<div class="greeting">
    Hei, <span class="username">hupu</span> 
</div>

  <main>
    <h2>Tänne päiväkirjahaut</h2>

    <!-- Hae ja Luo napit -->
    <div style="display:flex; gap:12px; justify-content:center; margin-bottom:30px;">
      <button class="get_entries">Hae päiväkirjamerkinnät</button>
      <button class="create_entry">Luo uusi merkintä</button>
    </div>

    <!-- Merkintäkorttien alue -->
    <section class="diary-card-area"></section>
  </main>

  <footer>
    <p>Copyright</p>
  </footer>

  <!-- UUSI: Dialogi uuden merkinnän luontiin -->
  <dialog class="diary_dialog" id="newEntryDialog">
    <form id="newEntryForm" method="dialog" style="display:flex;flex-direction:column;gap:10px;min-width:280px">
      <h3>Uusi päiväkirjamerkintä</h3>

      <label>Päivämäärä
        <input type="date" name="entry_date" required />
      </label>

      <label>Mieli (1–5)
        <input type="number" name="mood" min="1" max="5" required />
      </label>

      <label>Paino (kg)
        <input type="number" name="weight" step="0.1" min="0" required />
      </label>

      <label>Uni (h)
        <input type="number" name="sleep_hours" step="0.1" min="0" required />
      </label>

      <label>Askeleet
        <input type="number" name="steps" min="0" value="0" />
      </label>

      <label>Syödyt kalorit
        <input type="number" name="caloriesConsumed" min="0" value="0" />
      </label>

      <label>Kulutetut kalorit
        <input type="number" name="caloriesBurned" min="0" value="0" />
      </label>

      <label>Muistiinpanot
        <textarea name="notes" rows="3" placeholder="Vapaa kuvaus..." required></textarea>
      </label>

      <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:10px;">
        <button type="button" id="cancelDialog">Peruuta</button>
        <button type="submit" id="saveEntry">Tallenna</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="/diary/diary.js"></script>
  <script type="module" src="/js/loggedUser.js"></script>
</body>
</html>
