
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kirjaudu</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="login.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <nav>
      <ul>
        <li><a href="/index.html">Etusivu</a></li>
        <li><a href="/diary/diary.html">Päiväkirja</a></li>
        <li><a href="/bmi/bmi.html">BMI-Laskuri</a></li>
        <li><a href="/yhteystiedot/yhteystiedot.html">Yhteystiedot</a></li>
        <li><a href="/login/login.html">Kirjaudu</a></li>
      </ul>
    </nav>

    <!-- GREETING -->
    <div class="greeting">
      Hei: <span class="username">Vieras</span>
    </div>

    <!-- MAIN SISÄLTÖ -->
    <main>
      <h3>Rekisteröidy käyttäjäksi</h3>

      <form class="registerForm">
        <label for="username">Username</label>
        <input id="username" type="text" name="username" placeholder="daisy" />

        <label for="password">Password</label>
        <input id="password" type="password" name="password" placeholder="duck" />

        <label for="email">Email</label>
        <input id="email" type="email" name="email" placeholder="daisy@example.com" />

        <input name="submit" type="submit" value="Sign up" class="postuser" />
      </form>

      <h3>Onko sinulla jo käyttäjätili? Kirjaudu sisään tästä</h3>

      <form class="loginForm">
        <label for="username">Username</label>
        <input type="text" name="username" placeholder="name" value="daisy" />

        <label for="password">Password</label>
        <input type="password" name="password" placeholder="name123" value="duck" />

        <input name="submit" type="submit" value="Login" class="loginform" />
      </form>

      <br />
      <div id="loginResponse"></div>

    </main>

    <footer>Copyright</footer>

    <script type="module" src="/js/login.js"></script>
    <script type="module" src="/js/loggedUser.js"></script>
  </body>
</html>
